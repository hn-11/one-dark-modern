# Tag v* -> build all five artifacts and attach them to a GitHub Release.
# Normal flow: `npm version patch` (builds, commits, tags, pushes).
name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-node-project

      - name: Check tag matches package.json version
        run: |
          PKG_VERSION=$(node -p "require('./package.json').version")
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          if [ "$PKG_VERSION" != "$TAG_VERSION" ]; then
            echo "Tag $GITHUB_REF_NAME does not match package.json version $PKG_VERSION" >&2
            exit 1
          fi

      - run: npm run build
      - run: npm run package

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            *.vsix
            dist/jetbrains/OneDarkModern.icls
            dist/ghostty/one-dark-modern
            dist/windows-terminal/one-dark-modern.json
            dist/vim/colors/one-dark-modern.vim
          generate_release_notes: true
