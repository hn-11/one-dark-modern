# Monthly upstream sync: re-fetch Dark Modern (microsoft/vscode) and
# One Dark Pro (Binaryify), rebuild with our overrides/ applied, and open
# an auto-merge PR. CI (build + flicker-audit) is the merge gate; overrides
# win over upstream by construction, so nothing customized can revert.
name: Sync upstream themes

on:
  schedule:
    - cron: "0 6 1 * *" # 1st of every month, 06:00 UTC (upstreams change a few times a year)
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-node-project

      - name: Fetch upstream theme files
        run: |
          curl -sSfL -o upstream/dark_modern.json \
            https://raw.githubusercontent.com/microsoft/vscode/main/extensions/theme-defaults/themes/dark_modern.json
          curl -sSfL -o upstream/OneDark-Pro.json \
            https://raw.githubusercontent.com/Binaryify/OneDark-Pro/master/themes/OneDark-Pro.json

      - name: Rebuild theme from new snapshots
        run: npm run build

      - name: Open PR if anything changed
        id: pr
        uses: peter-evans/create-pull-request@v6
        with:
          branch: chore/upstream-sync
          commit-message: "chore: sync upstream themes (Dark Modern / One Dark Pro)"
          title: "Sync upstream themes (Dark Modern / One Dark Pro)"
          body: |
            Automated upstream sync. The diff of `upstream/` shows what changed
            in the sources; `themes/` is the rebuilt result with our
            `overrides/` applied on top.

            CI validates the build. If a change looks wrong, add or adjust an
            entry in `overrides/` on this branch before merging.

      - name: Enable auto-merge
        if: steps.pr.outputs.pull-request-operation == 'created'
        run: gh pr merge --auto --squash "${{ steps.pr.outputs.pull-request-number }}"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
