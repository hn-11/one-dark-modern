name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm run typecheck
      - run: npm run build
      - name: Check generated theme is committed
        run: git diff --exit-code themes/
      - uses: actions/setup-go@v5
        with:
          go-version: stable
      - name: Install gopls
        run: go install golang.org/x/tools/gopls@latest
      - name: Flicker audit (TM vs semantic)
        run: npm run audit
      - run: npm run package
      - run: npm run package:jetbrains
