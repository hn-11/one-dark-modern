# Gate for every push/PR. Two required checks (see the "main protection"
# ruleset): `build` is the fast correctness gate, `flicker-audit` is the
# slower TM-vs-semantic verification. Auto-merged upstream-sync PRs wait
# for both.
name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Typecheck, reproducible build, packaging, and static .icls validation.
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-node-project
      - run: npm run typecheck
      - run: npm run build
      - name: Check generated theme is committed
        run: git diff --exit-code themes/
      - run: npm run package
      - name: Validate JetBrains scheme (XML + attribute keys)
        run: |
          sudo apt-get install -y --no-install-recommends libxml2-utils >/dev/null
          xmllint --noout dist/jetbrains/OneDarkModern.icls
          node scripts/audit-jetbrains.ts

  # Real-grammar + real-LSP flicker audit (scripts/audit-flicker.ts):
  # flags tokens whose color changes when semantic highlighting lands.
  flicker-audit:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-node-project
      - uses: actions/setup-go@v5
        with:
          go-version: stable
          cache: false
      - name: Compute cache month
        id: date
        run: echo "month=$(date +%Y-%m)" >> "$GITHUB_OUTPUT"
      - name: Cache gopls
        id: gopls-cache
        uses: actions/cache@v4
        with:
          path: ~/go/bin/gopls
          # refreshed monthly - keeps CI fast while still tracking gopls releases
          key: gopls-${{ runner.os }}-${{ steps.date.outputs.month }}
      - name: Install gopls
        if: steps.gopls-cache.outputs.cache-hit != 'true'
        run: go install golang.org/x/tools/gopls@latest
      - run: echo "$HOME/go/bin" >> "$GITHUB_PATH"
      - run: npm run audit
