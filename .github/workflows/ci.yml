name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm run typecheck
      - run: npm run build
      - name: Check generated theme is committed
        run: git diff --exit-code themes/
      - uses: actions/setup-go@v5
        with:
          go-version: stable
          cache: false
      - name: Compute cache month
        id: date
        run: echo "month=$(date +%Y-%m)" >> "$GITHUB_OUTPUT"
      - name: Cache gopls
        id: gopls-cache
        uses: actions/cache@v4
        with:
          path: ~/go/bin/gopls
          # refreshed monthly - keeps CI fast while still tracking gopls releases
          key: gopls-${{ runner.os }}-${{ steps.date.outputs.month }}
      - name: Install gopls
        if: steps.gopls-cache.outputs.cache-hit != 'true'
        run: go install golang.org/x/tools/gopls@latest
      - run: echo "$HOME/go/bin" >> "$GITHUB_PATH"
      - name: Flicker audit (TM vs semantic)
        run: npm run audit
      - run: npm run package
      - name: Validate JetBrains scheme XML
        run: |
          sudo apt-get install -y --no-install-recommends libxml2-utils >/dev/null
          xmllint --noout dist/jetbrains/OneDarkModern.icls
      - name: Validate JetBrains attribute keys
        run: node scripts/audit-jetbrains.ts
